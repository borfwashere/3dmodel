<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Borf 3D - Reality Editor (Dynamic)</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --win-gray: #c0c0c0; 
            --win-border-light: #ffffff; 
            --win-border-dark: #808080; 
            --win-blue-dark: #000080; 
            --win-blue-light: #1084d0;
            /* Colores Base Vaporwave */
            --vw-pink: #ff71ce;
            --vw-cyan: #01cdfe;
            --vw-purple: #b967ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; outline: none; }
        
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Tahoma', sans-serif; 
            background-color: #fff; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }

        #appWin { 
            width: 950px; height: 700px;
            background: var(--win-gray);
            border: 3px outset var(--win-border-light);
            display: flex; flex-direction: column; 
            box-shadow: 10px 10px 40px rgba(0,0,0,0.5);
        }

        .win-title { 
            background: linear-gradient(90deg, var(--win-blue-dark) 0%, var(--win-blue-light) 100%);
            color: white; padding: 3px 8px; font-weight: bold; font-size: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .close-btn { 
            width: 16px; height: 14px; background: var(--win-gray); 
            border: 2px outset #fff; cursor: pointer; color: #000; font-size: 9px;
            display: flex; align-items: center; justify-content: center;
        }

        .win-body { 
            flex: 1; display: flex; margin: 4px; border: 2px inset var(--win-border-dark); overflow: hidden;
        }

        /* PANEL IZQUIERDO */
        #sidebar { 
            width: 250px; background: var(--win-gray); 
            border-right: 2px solid var(--win-border-dark);
            display: flex; flex-direction: column; padding: 5px;
            overflow-y: auto;
        }
        
        .sidebar-header { font-weight:bold; font-size:11px; padding: 5px; border-bottom:1px solid #808080; margin-bottom: 5px;}

        .model-item { 
            padding: 8px 10px; cursor: pointer; font-size: 11px; 
            border: 1px solid transparent; display: flex; align-items: center; gap: 8px;
        }
        .model-item:hover { background: #fff; border: 1px dotted #000; }
        .model-item.active { background: var(--win-blue-dark); color: #fff; }

        /* --- PANEL DERECHO: EL REACTOR VAPORWAVE --- */
        #main-viewer { 
            flex: 1; position: relative; 
            /* Animación de cambio de color de fondo */
            animation: vapor-bg 10s infinite alternate linear;
            border-left: 2px solid var(--win-border-light);
            overflow: hidden;
        }

        @keyframes vapor-bg {
            0% { background-color: var(--vw-pink); }
            50% { background-color: var(--vw-cyan); }
            100% { background-color: var(--vw-purple); }
        }

        model-viewer { 
            width: 100%; height: 100%;
            background: transparent; /* Permite ver la animación de fondo */
            --poster-color: transparent;
        }

        /* Brillo ambiental dinámico sobre el modelo */
        #glow-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            background: radial-gradient(circle, transparent 20%, rgba(255,255,255,0.2) 100%);
            mix-blend-mode: overlay;
        }

        .win-footer { padding: 4px 10px; background: var(--win-gray); border-top: 1px solid var(--win-border-dark); font-size: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="appWin">
        <div class="win-title">
            <span id="winTitleText">REALITY_EDITOR_V1</span>
            <div class="close-btn">X</div>
        </div>
        
        <div class="win-body">
            <div id="sidebar">
                <div class="sidebar-header">MODEL_FILES_ROOT</div>
                <div id="modelList">Scanning...</div>
            </div>
            
            <div id="main-viewer">
                <div id="glow-overlay"></div>
                <model-viewer id="mv" 
                    src="" 
                    auto-rotate 
                    rotation-speed="60deg" 
                    shadow-intensity="1" 
                    exposure="1.5"
                    interaction-prompt="none"
                    style="--poster-color: transparent;">
                </model-viewer>
            </div>
        </div>
        
        <div class="win-footer" id="status">Borf Engine Ready | Auto-Rotate Active</div>
    </div>

    <script>
        const API_URL = "https://api.github.com/repos/borfwashere/3dmodel/contents/";
        const RAW_BASE = "https://raw.githubusercontent.com/borfwashere/3dmodel/main/";

        async function init() {
            try {
                const res = await fetch(API_URL);
                const files = await res.json();
                const models = files.filter(f => f.name.endsWith('.glb'));
                const list = document.getElementById('modelList');
                list.innerHTML = "";
                
                models.forEach((m, index) => {
                    const item = document.createElement('div');
                    item.className = 'model-item';
                    item.innerHTML = `[3D] ${m.name}`;
                    item.onclick = () => selectModel(m.name, item);
                    list.appendChild(item);
                    if(index === 0) selectModel(m.name, item);
                });
            } catch (e) { document.getElementById('modelList').innerText = "Network Error."; }
        }

        function selectModel(modelName, element) {
            document.querySelectorAll('.model-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            const mv = document.getElementById('mv');
            mv.src = RAW_BASE + modelName;
            document.getElementById('status').innerText = "Streaming: " + modelName;
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        init();
    </script>
</body>
</html>
