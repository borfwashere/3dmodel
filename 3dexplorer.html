<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borf 3D - 3D Explorer (Anti-Conflict)</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --win-gray: #c0c0c0; 
            --win-border-light: #ffffff; 
            --win-border-dark: #808080; 
            --win-blue-dark: #000080; 
            --win-blue-light: #1084d0;
            --vw-pink: #ff71ce;
            --vw-cyan: #01cdfe;
            --vw-purple: #b967ff;
        }

        /* RESET CRÍTICO PARA EVITAR FUGAS DE SCROLL */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            user-select: none; -webkit-touch-callout: none; outline: none; 
        }
        
        html, body { 
            width: 100%; height: 100%; 
            font-family: 'Tahoma', sans-serif; 
            background-color: #008080 !important; 
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIElEQVQIW2NkYGD4D8SogAnMZGhgYGD4D8SogAnMZGhgAH0EAgB/6B9OAAAAAElFTkSuQmCC");
            overflow: hidden; 
            position: fixed; /* Clava la app al viewport */
            display: flex; align-items: center; justify-content: center; 
            overscroll-behavior: none; /* Bloquea el "jale" hacia los padres */
        }

        #appWin { 
            width: 950px; height: 700px;
            background: var(--win-gray);
            border: 3px outset var(--win-border-light);
            display: flex; flex-direction: column; 
            box-shadow: 10px 10px 40px rgba(0,0,0,0.5);
            overscroll-behavior: none;
            touch-action: none; /* Los toques mueren aquí */
        }

        .win-title { 
            background: linear-gradient(90deg, var(--win-blue-dark) 0%, var(--win-blue-light) 100%);
            color: white; padding: 3px 8px; font-weight: bold; font-size: 12px;
            display: flex; justify-content: space-between; align-items: center;
            height: 22px; min-height: 22px;
        }

        .win-body { 
            flex: 1; display: flex; margin: 4px; border: 2px inset var(--win-border-dark); overflow: hidden; background: var(--win-gray);
        }

        #sidebar { 
            width: 250px; background: var(--win-gray); 
            border-right: 2px solid var(--win-border-dark);
            display: flex; flex-direction: column; padding: 5px;
            overflow-y: auto;
            touch-action: pan-y; /* Permite scroll vertical solo en la lista */
        }
        
        .sidebar-header { font-weight:bold; font-size:11px; padding: 5px; border-bottom:1px solid #808080; margin-bottom: 5px;}

        .model-item { 
            padding: 8px 10px; cursor: pointer; font-size: 11px; 
            border: 1px solid transparent; display: flex; align-items: center; gap: 8px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .model-item:hover { background: #fff; border: 1px dotted #000; }
        .model-item.active { background: var(--win-blue-dark); color: #fff; }

        #main-viewer { 
            flex: 1; position: relative; 
            animation: vapor-bg 2s infinite alternate ease-in-out;
            border-left: 2px solid var(--win-border-light);
            overflow: hidden;
            touch-action: none; /* Bloquea el scroll al tocar el visor */
        }

        @keyframes vapor-bg {
            0% { background-color: var(--vw-pink); }
            50% { background-color: var(--vw-cyan); }
            100% { background-color: var(--vw-purple); }
        }

        model-viewer { 
            width: 100%; height: 100%;
            background: transparent;
            --poster-color: transparent;
            touch-action: none; /* Obliga a que el dedo solo rote el modelo */
        }

        #glow-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            background: radial-gradient(circle, transparent 10%, rgba(255,255,255,0.3) 100%);
            mix-blend-mode: overlay;
        }

        .win-footer { padding: 4px 10px; background: var(--win-gray); border-top: 1px solid var(--win-border-dark); font-size: 10px; }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 950px), (orientation: portrait) {
            body, html { padding: 0; align-items: flex-start; }
            #appWin { width: 100vw; height: 100vh; max-width: none; max-height: none; border: none; box-shadow: none; }
            .win-body { flex-direction: column-reverse; margin: 0; }
            #sidebar { width: 100%; height: 35%; border-right: none; border-top: 2px solid var(--win-border-dark); }
            #main-viewer { height: 65%; border-left: none; }
            .model-item { padding: 15px 10px; font-size: 12px; }
            .win-title { height: 26px; font-size: 13px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="appWin">
        <div class="win-title">
            <span id="winTitleText">Borf 3D Explorer</span>
        </div>
        
        <div class="win-body">
            <div id="sidebar">
                <div class="sidebar-header">MODEL_FILES_ROOT</div>
                <div id="modelList">Scanning...</div>
            </div>
            
            <div id="main-viewer">
                <div id="glow-overlay"></div>
                <model-viewer id="mv" 
                    src="" 
                    auto-rotate 
                    camera-controls
                    disable-pan
                    interaction-prompt="none"
                    shadow-intensity="2" 
                    exposure="1.8"
                    style="touch-action: none;">
                </model-viewer>
            </div>
        </div>
        
        <div class="win-footer" id="status">Ready | Interaction: Fixed</div>
    </div>

    <script>
        const API_URL = "https://api.github.com/repos/borfwashere/3dmodel/contents/";
        const RAW_BASE = "https://raw.githubusercontent.com/borfwashere/3dmodel/main/";

        async function init() {
            try {
                const res = await fetch(API_URL);
                const files = await res.json();
                const models = files.filter(f => f.name.endsWith('.glb'));
                const list = document.getElementById('modelList');
                list.innerHTML = "";
                
                models.forEach((m, index) => {
                    const item = document.createElement('div');
                    item.className = 'model-item';
                    item.innerHTML = `[3D] ${m.name}`;
                    item.onclick = () => selectModel(m.name, item);
                    list.appendChild(item);
                    if(index === 0) selectModel(m.name, item);
                });
            } catch (e) { 
                document.getElementById('modelList').innerText = "Network Error."; 
            }
        }

        function selectModel(modelName, element) {
            document.querySelectorAll('.model-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            const mv = document.getElementById('mv');
            mv.src = RAW_BASE + modelName;
            document.getElementById('status').innerText = "Streaming: " + modelName;
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        init();
    </script>
</body>
</html>
