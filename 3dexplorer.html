<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borf 3D - 3D Explorer (Hybrid Edition)</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --win-gray: #c0c0c0; 
            --win-border-light: #ffffff; 
            --win-border-dark: #808080; 
            --win-blue-dark: #000080; 
            --win-blue-light: #1084d0;
            --vw-pink: #ff71ce;
            --vw-cyan: #01cdfe;
            --vw-purple: #b967ff;
        }

        /* Reset básico y desactivación de selección de texto */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-touch-callout: none; outline: none; }
        
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Tahoma', sans-serif; 
            background-color: #008080 !important; /* Color de fondo Win98 */
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIElEQVQIW2NkYGD4D8SogAnMZGhgYGD4D8SogAnMZGhgAH0EAgB/6B9OAAAAAElFTkSuQmCC");
            overflow: hidden; /* Evita scroll en el body */
            display: flex; align-items: center; justify-content: center; 
        }

        /* --- ESTILOS DE ESCRITORIO (Por defecto) --- */
        #appWin { 
            width: 950px; /* Ancho fijo en PC */
            height: 700px; /* Alto fijo en PC */
            background: var(--win-gray);
            border: 3px outset var(--win-border-light);
            display: flex; flex-direction: column; 
            box-shadow: 10px 10px 40px rgba(0,0,0,0.5);
            transition: all 0.2s ease-out; /* Suaviza el cambio de tamaño si se redimensiona */
        }

        .win-title { 
            background: linear-gradient(90deg, var(--win-blue-dark) 0%, var(--win-blue-light) 100%);
            color: white; padding: 3px 8px; font-weight: bold; font-size: 12px;
            display: flex; justify-content: space-between; align-items: center;
            height: 22px; min-height: 22px;
        }

        .win-body { 
            flex: 1; display: flex; margin: 4px; border: 2px inset var(--win-border-dark); overflow: hidden; background: var(--win-gray);
        }

        #sidebar { 
            width: 250px; background: var(--win-gray); 
            border-right: 2px solid var(--win-border-dark);
            display: flex; flex-direction: column; padding: 5px;
            overflow-y: auto; /* Scroll interno para la lista de modelos */
        }
        
        .sidebar-header { font-weight:bold; font-size:11px; padding: 5px; border-bottom:1px solid #808080; margin-bottom: 5px;}

        .model-item { 
            padding: 8px 10px; cursor: pointer; font-size: 11px; 
            border: 1px solid transparent; display: flex; align-items: center; gap: 8px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .model-item:hover { background: #fff; border: 1px dotted #000; }
        .model-item.active { background: var(--win-blue-dark); color: #fff; }

        #main-viewer { 
            flex: 1; position: relative; 
            animation: vapor-bg 2s infinite alternate ease-in-out;
            border-left: 2px solid var(--win-border-light);
            overflow: hidden;
        }

        @keyframes vapor-bg {
            0% { background-color: var(--vw-pink); }
            50% { background-color: var(--vw-cyan); }
            100% { background-color: var(--vw-purple); }
        }

        model-viewer { 
            width: 100%; height: 100%;
            background: transparent;
            --poster-color: transparent;
        }

        #glow-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            background: radial-gradient(circle, transparent 10%, rgba(255,255,255,0.3) 100%);
            mix-blend-mode: overlay;
        }

        .win-footer { padding: 4px 10px; background: var(--win-gray); border-top: 1px solid var(--win-border-dark); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- MEDIA QUERY PARA MÓVILES (Pantallas < 950px o verticales) --- */
        @media (max-width: 950px), (orientation: portrait) {
            body, html { padding: 0; align-items: flex-start; } /* Alinea la ventana arriba */

            #appWin { 
                width: 100vw; /* Ocupa todo el ancho */
                height: 100vh; /* Ocupa todo el alto */
                max-width: none; max-height: none; /* Elimina restricciones */
                border: none; /* Opcional: quita el borde grueso en móvil para ganar espacio */
                box-shadow: none;
            }

            .win-body { 
                flex-direction: column-reverse; /* Barra lateral abajo, visor arriba */
                margin: 0; /* Gana espacio */
            }

            #sidebar { 
                width: 100%; 
                height: 40%; /* La lista ocupa el 40% inferior */
                border-right: none; 
                border-top: 2px solid var(--win-border-dark); /* Borde de separación retro */
            }

            #main-viewer { 
                height: 60%; /* El visor ocupa el 60% superior */
                border-left: none; 
            }

            /* Items más grandes para facilitar el toque con los dedos */
            .model-item { padding: 15px 10px; font-size: 12px; }
            .sidebar-header { font-size: 10px; padding: 8px 5px; }
            .win-title { height: 26px; font-size: 13px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="appWin">
        <div class="win-title">
            <span id="winTitleText">3D Explorer v1.0</span>
            </div>
        
        <div class="win-body">
            <div id="sidebar">
                <div class="sidebar-header">MODEL_FILES_ROOT</div>
                <div id="modelList">Scanning...</div>
            </div>
            
            <div id="main-viewer">
                <div id="glow-overlay"></div>
                <model-viewer id="mv" 
                    src="" 
                    auto-rotate 
                    camera-controls
                    touch-action="pan-y"
                    rotation-speed="120deg" 
                    shadow-intensity="2" 
                    exposure="1.8"
                    interaction-prompt="auto">
                </model-viewer>
            </div>
        </div>
        
        <div class="win-footer" id="status">Borf 3D Explorer Ready</div>
    </div>

    <script>
        const API_URL = "https://api.github.com/repos/borfwashere/3dmodel/contents/";
        const RAW_BASE = "https://raw.githubusercontent.com/borfwashere/3dmodel/main/";

        async function init() {
            try {
                const res = await fetch(API_URL);
                const files = await res.json();
                
                if(!Array.isArray(files)) throw new Error("Respuesta de API inválida");

                // Filtra solo archivos .glb
                const models = files.filter(f => f.name.endsWith('.glb'));
                const list = document.getElementById('modelList');
                list.innerHTML = "";
                
                models.forEach((m, index) => {
                    const item = document.createElement('div');
                    item.className = 'model-item';
                    item.innerHTML = `[3D] ${m.name}`;
                    // Funciona en clic de ratón y toque de dedo
                    item.onclick = () => selectModel(m.name, item);
                    list.appendChild(item);
                    
                    // Carga el primer modelo por defecto
                    if(index === 0) selectModel(m.name, item);
                });
            } catch (e) { 
                document.getElementById('modelList').innerText = "Error de Red."; 
                console.error(e);
            }
        }

        function selectModel(modelName, element) {
            // Actualiza estado visual de la lista
            document.querySelectorAll('.model-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            
            // Carga el modelo en el viewer
            const mv = document.getElementById('mv');
            mv.src = RAW_BASE + modelName;
            
            // Actualiza barra de estado
            document.getElementById('status').innerText = "Streaming: " + modelName;
        }

        // Desactiva menú contextual (clic derecho)
        document.addEventListener('contextmenu', e => e.preventDefault());
        init();
    </script>
</body>
</html>
