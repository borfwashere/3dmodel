<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borf 3D Model System</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --win-gray: #c0c0c0; 
            --win-border-light: #ffffff; 
            --win-border-dark: #808080; 
            --win-blue-dark: #000080; 
            --win-blue-light: #1084d0; /* Degradado estilo Matrix */
            /* Tamaño fijo de la ventana flotante */
            --win-width: 600px; 
            --win-height: 500px;
        }
        
        /* BLOQUEO TOTAL DE SELECCIÓN Y CLIC DERECHO */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            user-select: none; -webkit-user-select: none;
            -webkit-user-drag: none; outline: none; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Tahoma', sans-serif; 
            /* Fondo verde azulado clásico de Windows 98 */
            background-color: #008080; 
            overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
        }

        /* --- VENTANA FLOTANTE WIN98 (MISMA LÓGICA QUE EL VISOR) --- */
        #window3d { 
            width: var(--win-width);
            height: var(--win-height);
            max-width: 95vw;
            max-height: 90vh;
            background: var(--win-gray);
            border: 3px outset var(--win-border-light);
            display: flex; 
            flex-direction: column; 
            z-index: 1000;
            box-shadow: 8px 8px 25px rgba(0,0,0,0.5);
        }

        /* BARRA DE TÍTULO CON DEGRADADO (ESTILO MATRIX/WIN98) */
        .win-title { 
            background: linear-gradient(90deg, var(--win-blue-dark) 0%, var(--win-blue-light) 100%);
            color: white; 
            padding: 3px 4px 3px 8px; 
            display: flex; justify-content: space-between; align-items: center; 
            font-weight: bold; font-size: 12px; letter-spacing: 0.5px;
        }
        
        .close-btn { 
            width: 16px; height: 14px; 
            background: var(--win-gray); border: 2px outset #fff; 
            color: black; font-size: 9px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-weight: bold;
        }
        .close-btn:active { border: 2px inset #fff; padding: 1px 0 0 1px; }

        /* CUERPO DE LA VENTANA (DONDE VA EL MODELO) */
        .win-body { 
            flex: 1; 
            background: #fff; /* Fondo blanco para el modelo */
            margin: 2px;
            border: 2px inset var(--win-border-dark); /* Efecto hundido */
            overflow: hidden;
            display: flex;
        }
        
        /* EL COMPONENTE 3D (Ocupa todo el cuerpo) */
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: #ffffff; /* Color de carga */
            background-color: #ffffff;
        }

        /* Barra de estado inferior (Opcional, Win98 style) */
        .win-footer { 
            padding: 2px 8px; 
            background: var(--win-gray); 
            border-top: 1px solid var(--win-border-dark);
            font-size: 11px;
            color: #000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="window3d">
        <div class="win-title">
            <span>Borf 3D Viewer - [Prueba Modelo]</span>
            <div class="close-btn" onclick="alert('Funcionalidad de cerrar deshabilitada para esta prueba autónoma.')">X</div>
        </div>
        
        <div class="win-body">
            <model-viewer 
                src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
                alt="Un modelo 3D de prueba"
                auto-rotate 
                camera-controls 
                shadow-intensity="1" 
                ar
                >
            </model-viewer>
        </div>
        
        <div class="win-footer">
            Modelo: Astronaut.glb | Estado: Estático, Auto-rotación activa
        </div>
    </div>

    <script>
        // Bloqueo estricto de click derecho en toda la página
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
